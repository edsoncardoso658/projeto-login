<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="estilos/mobile-first.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    
</head>
<body>
    <main>
                <img src="imagens/back_building_640.jpg" alt="Imagem Edificio">
                <h1>Login</h1>
                <p id="descricao">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Molestias officiis earum autem odio debitis neque aliquid ipsam reprehenderit distinctio, provident voluptatum aut maxime, nostrum similique voluptate, soluta quasi accusantium aspernatur?</p>
                    <form action="" id="login-form">
                        <p id="p_username">
                            <label for="iusername"><span class="material-symbols-outlined">person</span></label>
                            <input type="text" name="username" id="iusername" required minlength="5" maxlength="20" >
                        </p>
                
                        <p id="p_password">
                            <label for="ipassword"><span class="material-symbols-outlined">key</span></label>
                            <input type="password" name="password" id="ipassword" required minlength="8">
                        </p>


                        <p id="p_entrar"><input type="submit" value="Entrar" id="ientrar"></p>

                    </form>
                    
      

    </main>
    
</body>
</html>
